name: Publish

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

  publish-crate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish wfc-core
        run: cargo publish -p wfc-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true  # no-op if version already published

  publish-archlinux:
    needs: test
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm rust git openssh
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build package
        run: |
          cp pkg/archlinux/PKGBUILD /home/builder/PKGBUILD
          chown builder:builder /home/builder/PKGBUILD
          cd /home/builder
          su builder -c "makepkg -s --noconfirm"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wfc-cli-archlinux
          path: /home/builder/wfc-cli-git-*.pkg.tar.zst

      - name: Publish to AUR
        if: ${{ env.HAS_AUR_KEY != '' }}
        env:
          HAS_AUR_KEY: ${{ secrets.AUR_SSH_KEY }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new"
          git config --global --add safe.directory /tmp/aur-repo

          git clone ssh://aur@aur.archlinux.org/wfc-cli-git.git /tmp/aur-repo || {
            mkdir -p /tmp/aur-repo && cd /tmp/aur-repo && git init
            git remote add origin ssh://aur@aur.archlinux.org/wfc-cli-git.git
          }

          cp /home/builder/PKGBUILD /tmp/aur-repo/PKGBUILD
          chown -R builder:builder /tmp/aur-repo
          cd /tmp/aur-repo
          su builder -c "makepkg --printsrcinfo" > .SRCINFO || true

          git add PKGBUILD .SRCINFO
          git -c user.name="CI" -c user.email="ci@users.noreply.github.com" \
            commit -m "Update to ${GITHUB_SHA::7}" || true
          git push origin master
